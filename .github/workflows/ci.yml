name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: course

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: course/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('course/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit -- --run

      - name: Build
        env:
          DATABASE_URL: postgres://build:build@localhost:5432/build
          BETTER_AUTH_SECRET: ci-build-secret-thirty-two-chars-minimum-xx
          ORIGIN: http://localhost:5173
        run: pnpm build
