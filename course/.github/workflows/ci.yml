name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit -- --run

      - name: Build
        env:
          DATABASE_URL: postgres://build:build@localhost:5432/build
          BETTER_AUTH_SECRET: ci-build-secret-thirty-two-chars-minimum-xx
          ORIGIN: http://localhost:5173
        run: pnpm build
